name: Persona Eval

# Deliberately NOT on push/pull_request -- a full run is ~25 test cases x 2
# Groq calls each, and this should never silently burn API quota on every
# commit. Manually triggerable, plus a weekly check so persona regressions
# don't go unnoticed for months.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
        working-directory: api
      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > api/serviceAccountKey.json
      - name: Run eval harness
        working-directory: api
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: serviceAccountKey.json
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python eval/run_eval.py
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: api/eval/results/
